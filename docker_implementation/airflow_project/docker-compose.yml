services:
  airflow:
    image: apache/airflow:2.9.3
    container_name: airflow
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
    command: >
      bash -c "pip install pandas requests pymysql &&
               airflow db init &&
               airflow users create --username admin --password admin --firstname Usaid --lastname Ahmed --role Admin --email admin@example.com &&
               airflow webserver"